# patrol_points_arm.yaml
# 场景：智能水处理厂自动巡检
# 坐标系说明：世界坐标系 (单位：米)，原点在地图左下角区域
# arm_task 定义: 
#   0: 无任务 (仅路过/起点/终点)
#   1: 任务类型1 (视觉检测/仪表读取/水质取样)
#   2: 任务类型2 (机械臂操作/阀门开关/设备复位)

patrol_points_arm:
  # ================= 起点与终点 =================
  - name: "入口"
    x: 1.0
    y: 1.0
    z: 0.0
    arm_task: 0
    description: "机器人出发安全区，位于厂区左下角"

  - name: "出口"
    x: 19.0
    y: 1.0
    z: 0.0
    arm_task: 0
    description: "机器人返回充电区，位于厂区右下角"

  # ================= 巡检任务点 (对应图中红点编号) =================
  
  # 巡检点 1: 进水 pH 计检测
  - name: "巡检点1_进水pH"
    x: 2.5
    y: 14.5
    z: 0.5  # 假设仪表高度
    arm_task: 1
    description: "进水口 pH 计读数检测及外观检查"

  # 巡检点 2: 沉淀池监测
  - name: "巡检点2_沉淀池"
    x: 8.5
    y: 13.5
    z: 1.2
    arm_task: 1
    description: "沉淀池 1 和 2 的液位观察及表面漂浮物检测"

  # 巡检点 3: 加药系统检查
  - name: "巡检点3_加药系统"
    x: 4.5
    y: 6.5
    z: 0.8
    arm_task: 2
    description: "加药泵状态确认，必要时执行复位或阀门操作"

  # 巡检点 4: 圆形澄清池
  - name: "巡检点4_澄清池"
    x: 10.5
    y: 10.5
    z: 1.0
    arm_task: 1
    description: "圆形澄清池中心取样及刮泥机运行声音检测"

  # 巡检点 5: 过滤床监测
  - name: "巡检点5_过滤床"
    x: 16.5
    y: 14.5
    z: 1.5
    arm_task: 1
    description: "过滤床压差表读数及反冲洗管道检查"

  # 巡检点 6: 消毒池监测
  - name: "巡检点6_消毒池"
    x: 14.5
    y: 7.5
    z: 1.0
    arm_task: 1
    description: "消毒池余氯含量取样检测"

  # 巡检点 7: 清水池/储水池
  - name: "巡检点7_清水池"
    x: 18.5
    y: 7.5
    z: 1.2
    arm_task: 2
    description: "清水池水位确认及出水阀门状态检查"

  # 巡检点 8: 送水泵检查
  - name: "巡检点8_送水泵"
    x: 16.5
    y: 3.5
    z: 0.6
    arm_task: 2
    description: "送水泵组振动温度检测，异常时执行紧急停机操作"
